# Skill Registry
# Centralized configuration for skill availability across agents.
#
# How It Works:
# - Each skill is registered below with metadata
# - blocked_agents: List of agent names that CANNOT use this skill
# - granted_agents: Optional — if set, ONLY these agents can use the skill (overrides blocked)
# - Empty blocked_agents = available to everyone by default
#
# Adding a New Skill:
# Copy this template:
#   skill-name:
#     description: "Brief description"
#     blocked_agents: []

